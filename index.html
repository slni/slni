<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slni - 个人主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="avatar">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="50" fill="#e0e7ff"/>
                    <text x="50" y="65" font-size="40" text-anchor="middle" fill="#4f46e5" font-weight="bold">S</text>
                </svg>
            </div>
            <h1 class="name">slni</h1>
            <p class="title">开发者 · 开源爱好者</p>
        </header>

        <main class="main">
            <section class="intro">
                <p>你好！我是一名热爱技术的开发者，对开源社区充满热情。</p>
                <p>我专注于构建优雅、高效的应用程序，并乐于分享知识和经验。</p>
            </section>

            <section class="links">
                <a href="https://github.com/slni" class="link" target="_blank" rel="noopener noreferrer">
                    <span class="link-icon">📦</span>
                    <span class="link-text">GitHub</span>
                </a>
                <a href="mailto:hello@example.com" class="link">
                    <span class="link-icon">✉️</span>
                    <span class="link-text">Email</span>
                </a>
                <a href="https://twitter.com/slni" class="link" target="_blank" rel="noopener noreferrer">
                    <span class="link-icon">🐦</span>
                    <span class="link-text">Twitter</span>
                </a>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; <span id="year"></span> slni. Made with HTML, CSS & JavaScript</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
